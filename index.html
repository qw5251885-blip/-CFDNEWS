<div class="api-section">
  <label class="api-toggle" for="provider">
    <span>AI 服務設定</span>
  </label>

  <div class="api-body">
    <h3>免費 AI 提供商</h3>

    <div class="api-row">
      <select id="provider" class="api-inp">
        <option value="openrouter">OpenRouter（免費模型）</option>
        <option value="groq">Groq（免費額度）</option>
        <option value="gemini">Google Gemini（AI Studio）</option>
      </select>
    </div>

    <div class="api-row">
      <input id="apiKey" class="api-inp" type="password" placeholder="輸入 API Key">
      <input id="modelName" class="api-inp" type="text" placeholder="模型名稱">
    </div>

    <div class="api-row">
      <input id="apiUrl" class="api-inp" type="text" placeholder="API URL" readonly>
    </div>

    <div class="api-row">
      <button class="btn-save" id="saveApiBtn">儲存設定</button>
      <button class="btn-test" id="testApiBtn">測試連線</button>
    </div>

    <div class="api-hint" id="apiHint"></div>
    <div class="test-box" id="testBox"></div>
  </div>
</div>
